name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: unit (jest + jsdom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  e2e:
    name: e2e (headless Chromium)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # System Chromium — puppeteer-core does not ship a browser.
      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
      - run: npm install
      - name: Run E2E suite
        env:
          CHROME_BIN: /usr/bin/chromium-browser
        run: npm run test:e2e
